<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>文章编辑器 - 张琬沁的博客</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", Arial, sans-serif;
    line-height: 1.8;
    color: #333;
    background: #f5f7fa;
    overflow: hidden;
  }

  .container {
    display: flex;
    flex-direction: column;
    height: 100vh;
  }

  .header {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
    padding: 15px 20px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
  }

  .header h1 {
    font-size: 1.5em;
    margin-bottom: 5px;
  }

  .header p {
    opacity: 0.9;
    font-size: 0.9em;
  }

  .metadata {
    background: white;
    padding: 15px 20px;
    border-bottom: 1px solid #e0e0e0;
    display: flex;
    flex-wrap: wrap;
    gap: 15px;
    align-items: center;
  }

  .metadata-group {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .metadata-group label {
    font-size: 0.9em;
    color: #555;
    font-weight: 500;
  }

  .metadata-group input,
  .metadata-group select {
    padding: 6px 12px;
    border: 1px solid #ddd;
    border-radius: 6px;
    font-size: 0.9em;
  }

  .metadata-group input[type="text"] {
    min-width: 200px;
  }

  #title {
    flex: 1;
    min-width: 300px;
    font-size: 1em;
    font-weight: 500;
  }

  .status-group {
    display: flex;
    gap: 15px;
  }

  .status-group label {
    display: flex;
    align-items: center;
    gap: 5px;
    cursor: pointer;
  }

  .status-group input[type="radio"] {
    cursor: pointer;
  }

  .upload-btn {
    padding: 6px 15px;
    background: #667eea;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.9em;
    transition: all 0.3s;
  }

  .upload-btn:hover {
    background: #5568d3;
  }

  .editor-container {
    flex: 1;
    display: flex;
    overflow: hidden;
  }

  .editor-pane,
  .preview-pane {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .editor-pane {
    border-right: 1px solid #e0e0e0;
  }

  .pane-header {
    padding: 10px 15px;
    background: #f8f9fa;
    border-bottom: 1px solid #e0e0e0;
    font-weight: 600;
    font-size: 0.9em;
    color: #555;
  }

  #markdown-input {
    flex: 1;
    padding: 20px;
    border: none;
    resize: none;
    font-family: "Consolas", "Monaco", "Courier New", monospace;
    font-size: 0.95em;
    line-height: 1.6;
    outline: none;
  }

  #preview {
    flex: 1;
    padding: 20px;
    overflow-y: auto;
    background: white;
  }

  /* Preview样式 */
  #preview h1 {
    color: #2c3e50;
    font-size: 2em;
    margin-bottom: 15px;
    margin-top: 20px;
  }

  #preview h2 {
    color: #34495e;
    font-size: 1.5em;
    margin-top: 30px;
    margin-bottom: 15px;
  }

  #preview h3 {
    color: #34495e;
    font-size: 1.2em;
    margin-top: 25px;
    margin-bottom: 12px;
  }

  #preview p {
    margin-bottom: 15px;
  }

  #preview ul, #preview ol {
    margin-bottom: 15px;
    padding-left: 30px;
  }

  #preview li {
    margin-bottom: 8px;
  }

  #preview a {
    color: #667eea;
    text-decoration: none;
  }

  #preview a:hover {
    text-decoration: underline;
  }

  #preview blockquote {
    border-left: 4px solid #667eea;
    padding-left: 20px;
    margin: 20px 0;
    color: #555;
    font-style: italic;
  }

  #preview code {
    background: #f4f4f4;
    padding: 2px 6px;
    border-radius: 3px;
    font-family: "Consolas", "Monaco", monospace;
    font-size: 0.9em;
  }

  #preview pre {
    background: #2d3748;
    color: #e2e8f0;
    padding: 20px;
    border-radius: 8px;
    overflow-x: auto;
    margin: 20px 0;
  }

  #preview pre code {
    background: none;
    padding: 0;
    color: inherit;
  }

  #preview img {
    max-width: 100%;
    height: auto;
    border-radius: 8px;
    margin: 20px 0;
  }

  .toolbar {
    padding: 15px 20px;
    background: white;
    border-top: 1px solid #e0e0e0;
    display: flex;
    gap: 10px;
    justify-content: flex-end;
  }

  .btn {
    padding: 10px 20px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.9em;
    transition: all 0.3s;
    font-weight: 500;
  }

  .btn-primary {
    background: #667eea;
    color: white;
  }

  .btn-primary:hover {
    background: #5568d3;
  }

  .btn-success {
    background: #28a745;
    color: white;
  }

  .btn-success:hover {
    background: #218838;
  }

  .btn-secondary {
    background: #6c757d;
    color: white;
  }

  .btn-secondary:hover {
    background: #5a6268;
  }

  .btn-outline {
    background: white;
    color: #667eea;
    border: 2px solid #667eea;
  }

  .btn-outline:hover {
    background: #667eea;
    color: white;
  }

  #file-input {
    display: none;
  }

  .empty-preview {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: #999;
    font-size: 0.9em;
  }

  @media (max-width: 768px) {
    .editor-container {
      flex-direction: column;
    }

    .editor-pane {
      border-right: none;
      border-bottom: 1px solid #e0e0e0;
    }

    .metadata {
      flex-direction: column;
      align-items: stretch;
    }

    .metadata-group {
      flex-direction: column;
      align-items: stretch;
    }

    .metadata-group input[type="text"] {
      min-width: 100%;
    }

    #title {
      min-width: 100%;
    }
  }
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <h1>文章编辑器</h1>
    <p>在线编写Markdown，实时预览HTML效果</p>
  </div>

  <div class="metadata">
    <div class="metadata-group" style="flex: 1;">
      <label>标题:</label>
      <input type="text" id="title" placeholder="请输入文章标题...">
    </div>

    <div class="metadata-group">
      <label>分类:</label>
      <select id="category">
        <option value="学习">学习</option>
        <option value="面试记录">面试记录</option>
        <option value="生活">生活</option>
      </select>
    </div>

    <div class="metadata-group">
      <label>日期:</label>
      <input type="date" id="date">
    </div>

    <div class="metadata-group">
      <label>标签:</label>
      <input type="text" id="tags" placeholder="用逗号分隔">
    </div>

    <div class="status-group">
      <label>
        <input type="radio" name="status" value="private" checked>
        Private
      </label>
      <label>
        <input type="radio" name="status" value="public">
        Public
      </label>
    </div>

    <button class="upload-btn" onclick="document.getElementById('file-input').click()">
      上传 .md 文件
    </button>
    <input type="file" id="file-input" accept=".md,.markdown,.txt">
  </div>

  <div class="editor-container">
    <div class="editor-pane">
      <div class="pane-header">Markdown 输入</div>
      <textarea id="markdown-input" placeholder="在此输入Markdown内容...

示例：
# 这是标题

## 这是二级标题

这是一段文字，支持**粗体**和*斜体*。

- 列表项1
- 列表项2

> 这是引用

[链接文本](https://example.com)

`代码片段`

```
代码块
```
"></textarea>
    </div>

    <div class="preview-pane">
      <div class="pane-header">HTML 预览</div>
      <div id="preview">
        <div class="empty-preview">开始输入，预览将在此显示...</div>
      </div>
    </div>
  </div>

  <div class="toolbar">
    <button class="btn btn-outline" onclick="window.location.href='manage.html'">返回列表</button>
    <button class="btn btn-secondary" onclick="exportData()">导出JSON</button>
    <button class="btn btn-success" onclick="exportHTML()">导出HTML</button>
    <button class="btn btn-primary" onclick="saveArticle()">保存</button>
  </div>
</div>

<!-- 引入marked.js库 -->
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<!-- 引入文章管理模块 -->
<script src="js/articles.js"></script>

<script>
let currentArticleId = null;
let hasUnsavedChanges = false;
let debounceTimer = null;

// 初始化
window.onload = function() {
  // 设置默认日期
  document.getElementById('date').valueAsDate = new Date();

  // 从URL获取文章ID
  const urlParams = new URLSearchParams(window.location.search);
  currentArticleId = urlParams.get('id');

  if (currentArticleId) {
    loadArticle(currentArticleId);
  }

  // 监听输入变化
  document.getElementById('markdown-input').addEventListener('input', handleMarkdownInput);
  document.getElementById('title').addEventListener('input', markAsChanged);
  document.getElementById('category').addEventListener('change', markAsChanged);
  document.getElementById('date').addEventListener('change', markAsChanged);
  document.getElementById('tags').addEventListener('input', markAsChanged);
  document.querySelectorAll('input[name="status"]').forEach(radio => {
    radio.addEventListener('change', markAsChanged);
  });

  // 文件上传
  document.getElementById('file-input').addEventListener('change', handleFileUpload);

  // 离开页面提示
  window.addEventListener('beforeunload', function(e) {
    if (hasUnsavedChanges) {
      e.preventDefault();
      e.returnValue = '';
      return '';
    }
  });
};

// 加载文章
function loadArticle(id) {
  const article = ArticleManager.getById(id);
  if (!article) {
    Toast.show('文章不存在', 'error');
    return;
  }

  document.getElementById('title').value = article.title;
  document.getElementById('category').value = article.category;
  document.getElementById('date').value = article.date;
  document.getElementById('tags').value = article.tags ? article.tags.join(', ') : '';
  document.querySelector(`input[name="status"][value="${article.status}"]`).checked = true;
  document.getElementById('markdown-input').value = article.markdown || '';

  updatePreview();
  hasUnsavedChanges = false;
}

// 处理Markdown输入（带防抖）
function handleMarkdownInput() {
  markAsChanged();

  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(() => {
    updatePreview();
  }, 200);
}

// 更新预览
function updatePreview() {
  const markdown = document.getElementById('markdown-input').value;
  const preview = document.getElementById('preview');

  if (!markdown.trim()) {
    preview.innerHTML = '<div class="empty-preview">开始输入，预览将在此显示...</div>';
    return;
  }

  try {
    const html = marked.parse(markdown);
    preview.innerHTML = html;
  } catch (e) {
    preview.innerHTML = '<div class="empty-preview" style="color: #dc3545;">解析错误: ' + e.message + '</div>';
  }
}

// 标记为已修改
function markAsChanged() {
  hasUnsavedChanges = true;
}

// 处理文件上传
function handleFileUpload(event) {
  const file = event.target.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = function(e) {
    const content = e.target.result;
    document.getElementById('markdown-input').value = content;

    // 尝试从文件名提取标题
    const fileName = file.name.replace(/\.(md|markdown|txt)$/i, '');
    if (!document.getElementById('title').value) {
      document.getElementById('title').value = fileName;
    }

    updatePreview();
    markAsChanged();
    Toast.show('文件上传成功', 'success');
  };
  reader.readAsText(file);
}

// 保存文章
function saveArticle() {
  const title = document.getElementById('title').value.trim();
  if (!title) {
    Toast.show('请输入标题', 'error');
    return;
  }

  const markdown = document.getElementById('markdown-input').value;
  const category = document.getElementById('category').value;
  const date = document.getElementById('date').value;
  const tagsInput = document.getElementById('tags').value;
  const tags = tagsInput ? tagsInput.split(',').map(t => t.trim()).filter(t => t) : [];
  const status = document.querySelector('input[name="status"]:checked').value;

  // 生成HTML
  const html = markdown ? marked.parse(markdown) : '';

  const articleData = {
    title,
    category,
    date,
    tags,
    status,
    markdown,
    html
  };

  if (currentArticleId) {
    // 更新现有文章
    ArticleManager.update(currentArticleId, articleData);
    Toast.show('保存成功', 'success');
  } else {
    // 创建新文章
    const newArticle = ArticleManager.create(articleData);
    currentArticleId = newArticle.id;

    // 更新URL
    window.history.replaceState({}, '', `editor.html?id=${currentArticleId}`);
    Toast.show('创建成功', 'success');
  }

  hasUnsavedChanges = false;
}

// 导出HTML
function exportHTML() {
  if (!currentArticleId) {
    Toast.show('请先保存文章', 'error');
    return;
  }

  const article = ArticleManager.getById(currentArticleId);
  if (!article) {
    Toast.show('文章不存在', 'error');
    return;
  }

  const filePath = HTMLExporter.export(article);
  Toast.show(`HTML已导出`, 'success');
}

// 导出JSON数据
function exportData() {
  ArticleManager.exportJSON();
  Toast.show('数据已导出', 'success');
}
</script>

</body>
</html>
