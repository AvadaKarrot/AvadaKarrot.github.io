<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>稿件管理 - 张琬沁的博客</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", Arial, sans-serif;
    line-height: 1.8;
    color: #333;
    background: #f5f7fa;
    padding: 20px;
  }

  .header {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
    padding: 30px 20px;
    border-radius: 12px;
    margin-bottom: 30px;
  }

  .header h1 {
    font-size: 2em;
    margin-bottom: 5px;
  }

  .header p {
    opacity: 0.9;
  }

  .back-home {
    display: inline-block;
    background: rgba(255,255,255,0.2);
    color: white;
    padding: 8px 16px;
    border-radius: 8px;
    text-decoration: none;
    margin-bottom: 15px;
    transition: all 0.3s;
  }

  .back-home:hover {
    background: rgba(255,255,255,0.3);
  }

  .container {
    max-width: 1200px;
    margin: 0 auto;
  }

  .tabs {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
  }

  .tab {
    padding: 10px 20px;
    background: white;
    border: 2px solid #667eea;
    color: #667eea;
    border-radius: 8px;
    cursor: pointer;
    font-size: 1em;
    transition: all 0.3s;
  }

  .tab:hover,
  .tab.active {
    background: #667eea;
    color: white;
  }

  .section {
    background: white;
    border-radius: 12px;
    padding: 30px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    margin-bottom: 20px;
  }

  .section h2 {
    color: #667eea;
    margin-bottom: 20px;
    font-size: 1.5em;
  }

  table {
    width: 100%;
    border-collapse: collapse;
  }

  th {
    background: #f8f9fa;
    padding: 12px;
    text-align: left;
    font-weight: 600;
    color: #555;
    border-bottom: 2px solid #e0e0e0;
  }

  td {
    padding: 12px;
    border-bottom: 1px solid #eee;
  }

  .status-badge {
    display: inline-block;
    padding: 4px 10px;
    border-radius: 12px;
    font-size: 0.85em;
    font-weight: 500;
  }

  .status-draft {
    background: #fff3cd;
    color: #856404;
  }

  .status-public {
    background: #d4edda;
    color: #155724;
  }

  .btn {
    padding: 6px 12px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.9em;
    margin-right: 5px;
    transition: all 0.3s;
  }

  .btn-edit {
    background: #667eea;
    color: white;
  }

  .btn-edit:hover {
    background: #5568d3;
  }

  .btn-publish {
    background: #28a745;
    color: white;
  }

  .btn-publish:hover {
    background: #218838;
  }

  .btn-unpublish {
    background: #ffc107;
    color: #333;
  }

  .btn-unpublish:hover {
    background: #e0a800;
  }

  .btn-delete {
    background: #dc3545;
    color: white;
  }

  .btn-delete:hover {
    background: #c82333;
  }

  .btn-new {
    background: #667eea;
    color: white;
    padding: 12px 24px;
    text-decoration: none;
    display: inline-block;
    border-radius: 8px;
    margin-bottom: 20px;
  }

  .btn-new:hover {
    background: #5568d3;
  }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: #999;
  }

  .empty-state svg {
    width: 80px;
    height: 80px;
    margin-bottom: 20px;
    opacity: 0.5;
  }

  .category {
    display: inline-block;
    padding: 3px 8px;
    background: #e8ecf7;
    color: #667eea;
    border-radius: 10px;
    font-size: 0.8em;
    margin-right: 5px;
  }

  @media (max-width: 768px) {
    table {
      font-size: 0.9em;
    }

    .btn {
      padding: 4px 8px;
      font-size: 0.8em;
    }
  }
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <a href="index.html" class="back-home">← 返回主页</a>
    <h1>📝 稿件管理</h1>
    <p>管理你的博客文章草稿和已发布内容 · <a href="guide.html" style="color: white; text-decoration: underline;">使用指南</a></p>
  </div>

  <div style="display: flex; gap: 10px; margin-bottom: 20px;">
    <a href="editor.html" class="btn-new">+ 新建文章</a>
    <button class="btn-new" onclick="exportAllData()" style="background: #28a745;">导出所有数据</button>
    <button class="btn-new" onclick="importData()" style="background: #ffc107; color: #333;">导入数据</button>
  </div>
  <input type="file" id="import-file" accept=".json" style="display: none;">

  <div class="tabs">
    <div class="tab active" onclick="showTab('all')">全部</div>
    <div class="tab" onclick="showTab('public')">已发布</div>
    <div class="tab" onclick="showTab('draft')">草稿</div>
  </div>

  <div class="section" id="all-section">
    <h2>全部稿件</h2>
    <table id="all-table">
      <thead>
        <tr>
          <th>标题</th>
          <th>分类</th>
          <th>状态</th>
          <th>日期</th>
          <th>操作</th>
        </tr>
      </thead>
      <tbody id="all-tbody">
        <!-- 数据由JavaScript填充 -->
      </tbody>
    </table>
  </div>

  <div class="section" id="public-section" style="display:none;">
    <h2>已发布文章</h2>
    <table id="public-table">
      <thead>
        <tr>
          <th>标题</th>
          <th>分类</th>
          <th>日期</th>
          <th>操作</th>
        </tr>
      </thead>
      <tbody id="public-tbody">
        <!-- 数据由JavaScript填充 -->
      </tbody>
    </table>
  </div>

  <div class="section" id="draft-section" style="display:none;">
    <h2>草稿箱</h2>
    <table id="draft-table">
      <thead>
        <tr>
          <th>标题</th>
          <th>分类</th>
          <th>日期</th>
          <th>操作</th>
        </tr>
      </thead>
      <tbody id="draft-tbody">
        <!-- 数据由JavaScript填充 -->
      </tbody>
    </table>
  </div>
</div>

<script src="js/articles.js"></script>
<script>
// 获取所有文章
let articles = ArticleManager.getAll();

// 渲染表格
function renderTable() {
  const allTbody = document.getElementById('all-tbody');
  const publicTbody = document.getElementById('public-tbody');
  const draftTbody = document.getElementById('draft-tbody');

  allTbody.innerHTML = '';
  publicTbody.innerHTML = '';
  draftTbody.innerHTML = '';

  // 重新获取最新数据
  articles = ArticleManager.getAll();
  articles.sort((a, b) => new Date(b.date) - new Date(a.date));

  if (articles.length === 0) {
    const emptyRow = '<tr><td colspan="5" style="text-align: center; padding: 40px; color: #999;">暂无文章，点击"新建文章"开始创作</td></tr>';
    allTbody.innerHTML = emptyRow;
    publicTbody.innerHTML = '<tr><td colspan="4" style="text-align: center; padding: 40px; color: #999;">暂无已发布文章</td></tr>';
    draftTbody.innerHTML = '<tr><td colspan="4" style="text-align: center; padding: 40px; color: #999;">暂无草稿</td></tr>';
    return;
  }

  articles.forEach(article => {
    const row = createRow(article);
    allTbody.appendChild(row.cloneNode(true));

    if (article.status === 'public') {
      const publicRow = createRow(article, true);
      publicTbody.appendChild(publicRow);
    } else {
      const draftRow = createRow(article, true);
      draftTbody.appendChild(draftRow);
    }
  });

  // 绑定事件
  bindEvents();
}

// 绑定按钮事件
function bindEvents() {
  document.querySelectorAll('.btn-edit').forEach(btn => {
    btn.onclick = () => editArticle(btn.dataset.id);
  });
  document.querySelectorAll('.btn-publish').forEach(btn => {
    btn.onclick = () => publishArticle(btn.dataset.id);
  });
  document.querySelectorAll('.btn-unpublish').forEach(btn => {
    btn.onclick = () => unpublishArticle(btn.dataset.id);
  });
  document.querySelectorAll('.btn-delete').forEach(btn => {
    btn.onclick = () => deleteArticle(btn.dataset.id);
  });
  document.querySelectorAll('.btn-export').forEach(btn => {
    btn.onclick = () => exportArticleHTML(btn.dataset.id);
  });
  document.querySelectorAll('.btn-preview').forEach(btn => {
    btn.onclick = () => previewArticle(btn.dataset.id);
  });
}

// 创建表格行
function createRow(article, hideStatus = false) {
  const row = document.createElement('tr');

  const statusBadge = article.status === 'public'
    ? '<span class="status-badge status-public">已发布</span>'
    : '<span class="status-badge status-draft">草稿</span>';

  const publishBtn = article.status === 'private' || article.status === 'draft'
    ? `<button class="btn btn-publish" data-id="${article.id}">发布</button>`
    : `<button class="btn btn-unpublish" data-id="${article.id}">撤回</button>`;

  const tags = article.tags && article.tags.length > 0
    ? `<div style="margin-top: 5px;">${article.tags.map(tag => `<span class="category" style="font-size: 0.75em;">${tag}</span>`).join('')}</div>`
    : '';

  if (hideStatus) {
    // 用于已发布/草稿单独列表
    row.innerHTML = `
      <td>
        <strong>${article.title}</strong>
        ${tags}
      </td>
      <td><span class="category">${article.category}</span></td>
      <td>${article.date}</td>
      <td>
        <button class="btn btn-edit" data-id="${article.id}">编辑</button>
        <button class="btn btn-preview" data-id="${article.id}" style="background: #17a2b8; color: white;">预览</button>
        ${publishBtn}
        <button class="btn btn-export" data-id="${article.id}" style="background: #6c757d; color: white;">导出HTML</button>
        <button class="btn btn-delete" data-id="${article.id}">删除</button>
      </td>
    `;
  } else {
    // 用于全部列表
    row.innerHTML = `
      <td>
        <strong>${article.title}</strong>
        ${tags}
      </td>
      <td><span class="category">${article.category}</span></td>
      <td>${statusBadge}</td>
      <td>${article.date}</td>
      <td>
        <button class="btn btn-edit" data-id="${article.id}">编辑</button>
        <button class="btn btn-preview" data-id="${article.id}" style="background: #17a2b8; color: white;">预览</button>
        ${publishBtn}
        <button class="btn btn-export" data-id="${article.id}" style="background: #6c757d; color: white;">导出HTML</button>
        <button class="btn btn-delete" data-id="${article.id}">删除</button>
      </td>
    `;
  }

  return row;
}

// 切换标签
function showTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  event.target.classList.add('active');

  document.getElementById('all-section').style.display = tab === 'all' ? 'block' : 'none';
  document.getElementById('public-section').style.display = tab === 'public' ? 'block' : 'none';
  document.getElementById('draft-section').style.display = tab === 'draft' ? 'block' : 'none';
}

// 编辑文章
function editArticle(id) {
  window.location.href = `editor.html?id=${id}`;
}

// 预览文章
function previewArticle(id) {
  const article = ArticleManager.getById(id);
  if (!article) {
    alert('文章不存在');
    return;
  }

  // 在新窗口中打开预览
  const previewWindow = window.open('', '_blank');
  const html = HTMLExporter.generateHTML(article);
  previewWindow.document.write(html);
  previewWindow.document.close();
}

// 导出文章HTML
function exportArticleHTML(id) {
  const article = ArticleManager.getById(id);
  if (!article) {
    alert('文章不存在');
    return;
  }

  const filePath = HTMLExporter.export(article);
  Toast.show('HTML文件已导出', 'success');
}

// 发布文章
function publishArticle(id) {
  const article = ArticleManager.getById(id);
  if (!article) return;

  if (confirm(`确定要发布《${article.title}》吗？`)) {
    ArticleManager.publish(id);
    renderTable();
    Toast.show('文章已发布', 'success');
  }
}

// 撤回发布
function unpublishArticle(id) {
  const article = ArticleManager.getById(id);
  if (!article) return;

  if (confirm(`确定要撤回《${article.title}》吗？`)) {
    ArticleManager.unpublish(id);
    renderTable();
    Toast.show('文章已撤回', 'success');
  }
}

// 删除文章
function deleteArticle(id) {
  const article = ArticleManager.getById(id);
  if (!article) return;

  if (confirm(`确定要删除《${article.title}》吗？此操作不可恢复！`)) {
    ArticleManager.delete(id);
    renderTable();
    Toast.show('文章已删除', 'success');
  }
}

// 导出所有数据
function exportAllData() {
  ArticleManager.exportJSON();
  Toast.show('数据已导出', 'success');
}

// 导入数据
function importData() {
  document.getElementById('import-file').click();
}

// 处理文件导入
document.addEventListener('DOMContentLoaded', function() {
  const importFile = document.getElementById('import-file');
  if (importFile) {
    importFile.addEventListener('change', function(e) {
      const file = e.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = function(event) {
        try {
          const jsonString = event.target.result;
          const success = ArticleManager.importJSON(jsonString);
          if (success) {
            renderTable();
            Toast.show('数据导入成功', 'success');
          } else {
            alert('数据格式错误，导入失败');
          }
        } catch (e) {
          alert('文件读取失败：' + e.message);
        }
      };
      reader.readAsText(file);

      // 重置input
      e.target.value = '';
    });
  }
});

// 初始化
renderTable();
</script>

</body>
</html>
