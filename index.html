<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>张琬沁的学习与求职日记</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", Arial, sans-serif;
    line-height: 1.8;
    color: #333;
    background: #f5f7fa;
  }

  .header {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
    padding: 60px 20px;
    text-align: center;
  }

  .header h1 {
    font-size: 2.5em;
    margin-bottom: 10px;
  }

  .header p {
    font-size: 1.1em;
    opacity: 0.9;
  }

  .container {
    max-width: 900px;
    margin: -30px auto 60px;
    padding: 0 20px;
  }

  .nav {
    background: white;
    border-radius: 12px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    padding: 20px;
    margin-bottom: 30px;
    display: flex;
    gap: 15px;
    justify-content: center;
    flex-wrap: wrap;
  }

  .nav-btn {
    padding: 10px 24px;
    border: 2px solid #667eea;
    background: white;
    color: #667eea;
    border-radius: 25px;
    cursor: pointer;
    font-size: 1em;
    transition: all 0.3s;
    text-decoration: none;
    display: inline-block;
  }

  .nav-btn:hover,
  .nav-btn.active {
    background: #667eea;
    color: white;
  }

  .section {
    background: white;
    border-radius: 12px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    padding: 40px;
    margin-bottom: 30px;
  }

  .section h2 {
    color: #667eea;
    margin-bottom: 25px;
    font-size: 1.8em;
    border-bottom: 3px solid #667eea;
    padding-bottom: 10px;
  }

  .post-item {
    padding: 20px 0;
    border-bottom: 1px solid #eee;
  }

  .post-item:last-child {
    border-bottom: none;
  }

  .post-meta {
    color: #999;
    font-size: 0.9em;
    margin-bottom: 8px;
  }

  .post-title {
    font-size: 1.3em;
    color: #333;
    margin-bottom: 10px;
    font-weight: 600;
  }

  .post-title a {
    color: inherit;
    text-decoration: none;
  }

  .post-title a:hover {
    color: #667eea;
  }

  .post-excerpt {
    color: #666;
    line-height: 1.6;
  }

  .tag {
    display: inline-block;
    padding: 4px 12px;
    background: #e8ecf7;
    color: #667eea;
    border-radius: 15px;
    font-size: 0.85em;
    margin-right: 8px;
    margin-top: 8px;
  }

  .footer {
    text-align: center;
    padding: 40px 20px;
    color: #999;
    font-size: 0.9em;
  }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: #999;
  }

  @media (max-width: 768px) {
    .header h1 {
      font-size: 1.8em;
    }

    .section {
      padding: 25px;
    }
  }
</style>
</head>
<body>

<div class="header">
  <h1>张琬沁的学习与求职日记</h1>
  <p>多模态AI算法工程师 · 音乐×AI · 2026年求职ing</p>
</div>

<div class="container">
  <div class="nav">
    <a href="#learning" class="nav-btn active">📚 学习</a>
    <a href="#interview" class="nav-btn">💼 面试记录</a>
    <a href="#life" class="nav-btn">🎵 生活</a>
    <a href="manage.html" class="nav-btn" style="margin-left: auto; background: #667eea; color: white;">⚙️ 稿件管理</a>
  </div>

  <div class="section" id="learning">
    <h2>📚 学习</h2>
    <div id="learning-posts">
      <div class="empty-state">正在加载文章...</div>
    </div>
  </div>

  <div class="section" id="interview">
    <h2>💼 面试记录</h2>
    <div id="interview-posts">
      <div class="empty-state">正在加载文章...</div>
    </div>
  </div>

  <div class="section" id="life">
    <h2>🎵 生活</h2>
    <div id="life-posts">
      <div class="empty-state">正在加载文章...</div>
    </div>
  </div>
</div>

<div class="footer">
  <p>© 2026 张琬沁 · 基于GitHub Pages搭建</p>
  <p>联系方式：zhangwanqin@njust.edu.cn</p>
</div>

<script src="js/articles.js"></script>
<script>
// 从localStorage加载并渲染文章
function loadArticles() {
  const articleManager = new ArticleManager();
  const allArticles = articleManager.getAll();

  // 只显示已发布的文章
  const publicArticles = allArticles.filter(a => a.status === 'public');

  // 按分类分组
  const categories = {
    '学习': [],
    '面试记录': [],
    '生活': []
  };

  publicArticles.forEach(article => {
    if (categories[article.category]) {
      categories[article.category].push(article);
    }
  });

  // 渲染各分类
  renderCategory('learning', categories['学习']);
  renderCategory('interview', categories['面试记录']);
  renderCategory('life', categories['生活']);
}

function renderCategory(categoryId, articles) {
  const container = document.getElementById(`${categoryId}-posts`);

  if (!articles || articles.length === 0) {
    container.innerHTML = '<div class="empty-state">暂无文章</div>';
    return;
  }

  // 按日期倒序排列
  articles.sort((a, b) => new Date(b.date) - new Date(a.date));

  container.innerHTML = articles.map(article => {
    const excerpt = getExcerpt(article.markdown || article.html);
    const tagsHtml = (article.tags || []).map(tag =>
      `<span class="tag">${tag}</span>`
    ).join('');

    return `
      <div class="post-item">
        <div class="post-meta">${article.date}</div>
        <div class="post-title">
          <a href="posts/${article.id}.html">${article.title}</a>
        </div>
        <div class="post-excerpt">${excerpt}</div>
        <div class="tags">${tagsHtml}</div>
      </div>
    `;
  }).join('');
}

function getExcerpt(content) {
  if (!content) return '';

  // 移除Markdown标记和HTML标签，获取纯文本
  let text = content
    .replace(/#+\s/g, '')           // 移除标题标记
    .replace(/\*\*(.+?)\*\*/g, '$1') // 移除粗体
    .replace(/\*(.+?)\*/g, '$1')     // 移除斜体
    .replace(/<[^>]+>/g, '')         // 移除HTML标签
    .replace(/\n+/g, ' ')            // 替换换行
    .trim();

  // 截取前150字符
  return text.length > 150 ? text.substring(0, 150) + '...' : text;
}

// 导航高亮切换
document.querySelectorAll('.nav-btn').forEach(btn => {
  btn.addEventListener('click', function(e) {
    if (this.getAttribute('href').startsWith('#')) {
      e.preventDefault();
      document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
      this.classList.add('active');

      const targetId = this.getAttribute('href').substring(1);
      const targetSection = document.getElementById(targetId);
      if (targetSection) {
        targetSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }
    }
  });
});

// 页面加载时加载文章
window.addEventListener('DOMContentLoaded', loadArticles);
</script>

</body>
</html>
